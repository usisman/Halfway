<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Halfway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=IBM+Plex+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Halfway MVP</p>
        <h1>Ortak noktayı birlikte bulalım.</h1>
        <p class="lead">
          Jam oluştur, konumunu gönder, ortalama noktayı ve bölge adını anında gör.
        </p>
      </header>

      <section class="card">
        <h2>1) Jam oluştur</h2>
        <div class="row">
          <button id="createJamBtn">Yeni jam oluştur</button>
          <div class="field">
            <label for="jamId">Jam ID</label>
            <input id="jamId" type="text" placeholder="örn: 3f5e..." />
          </div>
        </div>
        <div class="field">
          <label for="shareLink">Paylaşım linki</label>
          <input id="shareLink" type="text" readonly />
        </div>
      </section>

      <section class="card">
        <h2>2) Konum gönder</h2>
        <p class="hint">
          Jam ID dolu olmalı. Konum izni istenirse onay ver.
        </p>
        <div class="row">
          <button id="sendLocationBtn">Konumumu gönder</button>
          <button id="getResultBtn" class="ghost">Sonucu getir</button>
        </div>
      </section>

      <section class="card">
        <h2>3) Sonuç</h2>
        <div class="result" id="result">Henüz veri yok.</div>
      </section>

      <section class="card status">
        <h2>Durum</h2>
        <div id="status">Hazır.</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
